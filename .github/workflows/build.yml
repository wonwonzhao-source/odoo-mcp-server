name: Build Standalone Executables

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            artifact: odoo-mcp-macos
            ext: ""
            pyinstaller: ""
          - os: windows-latest
            artifact: odoo-mcp-windows
            ext: ".exe"
            pyinstaller: ""
          - os: ubuntu-latest
            artifact: odoo-mcp-linux
            ext: ""
            pyinstaller: ""

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -e .
          pip install pyinstaller

      - name: Build macOS/Linux executable
        if: matrix.os != 'windows-latest'
        run: |
          pyinstaller \
            --name odoo-mcp \
            --onefile \
            --console \
            --clean \
            src/odoo_mcp/__main__.py
          mv dist/odoo-mcp dist/${{ matrix.artifact }}

      - name: Build Windows executable
        if: matrix.os == 'windows-latest'
        run: pyinstaller --name odoo-mcp --onefile --console --clean src/odoo_mcp/__main__.py; move dist\odoo-mcp.exe dist\${{ matrix.artifact }}.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}${{ matrix.ext }}
          retention-days: 90

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: odoo-mcp-macos
          path: dist

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: odoo-mcp-windows
          path: dist

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: odoo-mcp-linux
          path: dist

      - name: Make macOS binary executable
        run: chmod +x dist/odoo-mcp-macos

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/odoo-mcp-macos
            dist/odoo-mcp-windows.exe
            dist/odoo-mcp-linux
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
